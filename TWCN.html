<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兩岸溝通助手</title>

    <style>
        body {
            font-family: "PingFang TC","Microsoft JhengHei",sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }

        .box {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 95%;
            max-width: 600px;
        }

        h2 {
            color: #1a73e8;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #e8e8e8;
            font-size: 16px;
        }

        .btns {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }

        .to-cn { background: #34a853; }
        .to-tw { background: #ea4335; }

        #res {
            background: #f8faff;
            padding: 20px;
            border-radius: 12px;
            min-height: 100px;
            border-left: 6px solid #1a73e8;
            white-space: pre-wrap;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>兩岸溝通助手</h2>

    <textarea id="inp" placeholder="輸入文字..."></textarea>

    <div class="btns">
        <button class="to-cn" onclick="run('tw2cn')">轉大陸用語</button>
        <button class="to-tw" onclick="run('cn2tw')">轉台灣用語</button>
    </div>

    <div>轉換結果：</div>
    <div id="res">等待輸入...</div>
</div>

<script>
const API_KEY = "AIzaSyA6raMtENO2QRUXARDRIEFh3bkToSU61ig";

async function run(mode) {
    const text = document.getElementById("inp").value.trim();
    const resDiv = document.getElementById("res");

    if (!text) {
        alert("請輸入內容");
        return;
    }

    resDiv.innerText = "轉換中...";

    let prompt = mode === "tw2cn"
        ? "把這段台灣用語轉成中國大陸用語（簡體+在地詞）：\n"
        : "把這段中國大陸用語轉成台灣用語（繁體+在地詞）：\n";

    try {
        const response = await fetch(
            `https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    contents: [{
                        role: "user",
                        parts: [{
                            text: prompt + text
                        }]
                    }]
                })
            }
        );

        const data = await response.json();

        if (data.error) {
            throw new Error(data.error.message);
        }

        const result = data.candidates?.[0]?.content?.parts?.[0]?.text;

        resDiv.innerText = result || "沒有回傳結果";

    } catch (err) {
        console.error(err);
        resDiv.innerHTML = `<div class="error">錯誤：${err.message}</div>`;
    }
}
</script>

</body>
</html>
