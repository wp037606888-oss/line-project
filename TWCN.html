<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兩岸溝通助手 Pro</title>

<style>
body {
    font-family: "Microsoft JhengHei";
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    padding-top: 50px;
}
.box {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 600px;
}
textarea {
    width: 100%;
    height: 140px;
    padding: 10px;
}
button {
    margin-top: 10px;
    padding: 12px;
    width: 49%;
    color: white;
    border: none;
    cursor: pointer;
}
.to-cn { background: #34a853; }
.to-tw { background: #ea4335; }

#res {
    margin-top: 15px;
    background: #f8faff;
    padding: 15px;
    min-height: 80px;
}
.fast { color: #888; font-size: 13px; }
</style>
</head>

<body>

<div class="box">
<h2>兩岸溝通助手 Pro</h2>

<textarea id="inp"></textarea>

<br>
<button class="to-cn" onclick="run('tw2cn')">台 → 陸</button>
<button class="to-tw" onclick="run('cn2tw')">陸 → 台</button>

<div id="res">等待輸入...</div>
<div class="fast" id="mode"></div>
</div>

<script>

// 👉 你的 API（可留空）
const API_KEY = "你的API_KEY";

// 👉 詞庫（可自己擴充）
const dict_tw2cn = {
    "公車": "公交",
    "計程車": "出租車",
    "機車": "電動車",
    "影片": "視頻",
    "軟體": "軟件",
    "行動電源": "充電寶",
    "品質": "質量",
    "網路": "網絡",
    "資料": "數據"
};

const dict_cn2tw = {
    "公交": "公車",
    "出租車": "計程車",
    "電動車": "機車",
    "視頻": "影片",
    "軟件": "軟體",
    "充電寶": "行動電源",
    "質量": "品質",
    "網絡": "網路",
    "數據": "資料"
};

// 👉 詞庫轉換
function convertByDict(text, dict) {
    for (let key in dict) {
        text = text.replaceAll(key, dict[key]);
    }
    return text;
}

// 👉 主流程
async function run(mode) {
    const input = document.getElementById("inp").value.trim();
    const res = document.getElementById("res");
    const modeText = document.getElementById("mode");

    if (!input) return alert("請輸入內容");

    // 1️⃣ 先詞庫轉換（秒回）
    let base = mode === "tw2cn"
        ? convertByDict(input, dict_tw2cn)
        : convertByDict(input, dict_cn2tw);

    res.innerText = base;
    modeText.innerText = "⚡ 已使用快速詞庫";

    // 2️⃣ 沒 API 就結束
    if (!API_KEY) return;

    try {
        modeText.innerText = "🧠 AI 潤飾中...";

        const prompt = mode === "tw2cn"
            ? "把這段文字轉成中國大陸在地自然說法（簡體）：\n"
            : "把這段文字轉成台灣在地自然說法（繁體）：\n";

        const response = await fetch(
            `https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
            {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: prompt + base }]
                    }]
                })
            }
        );

        const data = await response.json();

        if (data.error) throw new Error(data.error.message);

        const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;

        if (aiText) {
            res.innerText = aiText;
            modeText.innerText = "🚀 AI 優化完成";
        }

    } catch (e) {
        console.log("AI fallback:", e.message);
        modeText.innerText = "⚡ 使用詞庫（AI 不可用）";
    }
}

</script>

</body>
</html>
