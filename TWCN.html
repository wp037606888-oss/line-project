<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兩岸溝通助手 - 專業翻譯版</title>
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
    <style>
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding-top: 50px; }
        .box { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 25px; font-size: 28px; }
        .label { font-weight: bold; margin-bottom: 8px; color: #444; display: block; }
        textarea { width: 100%; height: 150px; padding: 15px; border: 2px solid #e8e8e8; border-radius: 12px; font-size: 16px; box-sizing: border-box; transition: 0.3s; resize: vertical; }
        textarea:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 8px rgba(26,115,232,0.1); }
        .btns { display: flex; gap: 15px; margin: 25px 0; }
        button { flex: 1; padding: 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; color: white; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .to-cn { background: linear-gradient(135deg, #34a853, #2d8e47); }
        .to-tw { background: linear-gradient(135deg, #ea4335, #c5392d); }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); opacity: 0.95; }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .result-container { margin-top: 25px; border-top: 2px dashed #eee; padding-top: 20px; }
        #res { background: #f8faff; padding: 20px; border-radius: 12px; min-height: 100px; border-left: 6px solid #1a73e8; white-space: pre-wrap; font-size: 18px; line-height: 1.6; color: #222; }
        .error-msg { color: #d93025; font-size: 14px; background: #fce8e6; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .loading { color: #1a73e8; font-style: italic; }
    </style>
</head>
<body>

<div class="box">
    <h2>兩岸溝通助手</h2>
    
    <label class="label">輸入對話內容：</label>
    <textarea id="inp" placeholder="例如：我等等要去搭公交..."></textarea>
    
    <div class="btns">
        <button id="btnCN" class="to-cn" onclick="run('tw2cn')">轉大陸用語 (給員工)</button>
        <button id="btnTW" class="to-tw" onclick="run('cn2tw')">轉台灣用語 (給客戶)</button>
    </div>

    <div class="result-container">
        <label class="label">轉換結果：</label>
        <div id="res">等待輸入中...</div>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // 填入您剛才取得的 API Key
    const API_KEY = "AIzaSyA_kd60ql0QmoVXWL_HokQPKZ0n1uyzxeE0"; 
    const genAI = new GoogleGenerativeAI(API_KEY);

    window.run = async (mode) => {
        const inputField = document.getElementById('inp');
        const resDiv = document.getElementById('res');
        const btnCN = document.getElementById('btnCN');
        const btnTW = document.getElementById('btnTW');
        const text = inputField.value.trim();

        if (!text) {
            alert("請先輸入內容！");
            return;
        }

        btnCN.disabled = true;
        btnTW.disabled = true;
        resDiv.innerHTML = '<span class="loading">AI 正在轉換語境中，請稍候...</span>';

        try {
            // 使用 1.5 Flash 模型，平衡速度與品質
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            
            let systemPrompt = "";
            if (mode === 'tw2cn') {
                systemPrompt = `你是一位專業的翻譯官。請將以下台灣繁體內容轉換為大陸簡體，並修正用語（影片->视频、軟體->软件、記憶體->內存、機車->摩托车、搭公車->搭公交）。直接輸出翻譯後文字，不要解釋。內容：\n\n`;
            } else {
                systemPrompt = `你是一位專業的翻譯官。請將以下大陸簡體內容轉換為台灣繁體，並修正用語（视频->影片、软件->軟體、內存->記憶體、質量->品質、公交->公車、出租车->計程車）。直接輸出翻譯後文字，不要解釋。內容：\n\n`;
            }

            const result = await model.generateContent(systemPrompt + text);
            const response = await result.response;
            resDiv.innerText = response.text();

        } catch (e) {
            console.error(e);
            resDiv.innerHTML = `
                <div class="error-msg">
                    <strong>連線失敗！</strong><br>
                    1. 請確認是否安裝了 <b>AdBlock (廣告攔截器)</b>，請將此網頁設為白名單。<br>
                    2. 若您使用公司網路，可能防火牆阻擋了 Google API 連線。<br>
                    3. 詳細錯誤：${e.message}
                </div>`;
        } finally {
            btnCN.disabled = false;
            btnTW.disabled = false;
        }
    };
</script>

</body>
</html>
